<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Timer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="button-grid">
        <button class="exercise-btn" onclick="startEyeExercise()">
            <span class="icon">🧐</span>
            <span class="label">8 min</span>
        </button>
        <button class="exercise-btn" onclick="startYog()">
            <span class="icon">🧘</span>
            <span class="label">9 min</span>
        </button>
        <button class="exercise-btn" onclick="startBellyExercise()">
            <span class="icon">🦘</span>
            <span class="label">5 min</span>
        </button>
        <button class="exercise-btn" onclick="startRun()">
            <span class="icon">🏃</span>
            <span class="label">14 min</span>
        </button>
    </div>

    <script src="https://unpkg.com/nosleep.js@0.12.0/dist/NoSleep.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
